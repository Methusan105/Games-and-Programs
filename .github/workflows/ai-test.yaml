name: Local AI Image Analyzer

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: "Image URL"
        required: true
        type: string
      question:
        description: "Question"
        required: false
        default: "Describe this image."

jobs:
  vision:
    runs-on: ubuntu-latest

    steps:
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 5

      - name: Download vision model
        run: |
          ollama pull llava

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          pip install requests

      - name: Analyze image
        env:
          IMAGE_URL: ${{ github.event.inputs.image_url }}
          QUESTION: ${{ github.event.inputs.question }}
        run: |
          python3 <<'PY'
          import os
          import requests
          import base64
          import json
          import subprocess

          url = os.environ["IMAGE_URL"]
          question = os.environ["QUESTION"]

          img = requests.get(url).content

          encoded = base64.b64encode(img).decode()

          payload = {
              "model": "llava",
              "prompt": question,
              "images": [encoded],
              "stream": False
          }

          result = requests.post(
              "http://localhost:11434/api/generate",
              json=payload
          )

          print(result.json()["response"])
          PY
