name: Local AI Image Analyzer

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: "Direct image URL"
        required: true
        type: string
      question:
        description: "Question"
        required: false
        default: "Describe this image in detail."

jobs:
  vision:
    runs-on: ubuntu-latest

    steps:
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          
          echo "Waiting for Ollama..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            sleep 2
          done

      - name: Download vision model
        run: |
          ollama pull llava

      - name: Check Ollama
        run: |
          ollama list
          curl http://localhost:11434/api/tags

      - name: Install Python tools
        run: |
          pip install requests

      - name: Analyze image
        env:
          IMAGE_URL: ${{ github.event.inputs.image_url }}
          QUESTION: ${{ github.event.inputs.question }}

        run: |
          python3 <<'PY'

          import os
          import requests
          import base64
          import json

          image_url = os.environ["IMAGE_URL"]
          question = os.environ["QUESTION"]

          print("Downloading image:", image_url)

          img_request = requests.get(
              image_url,
              timeout=30
          )

          if img_request.status_code != 200:
              raise Exception(
                  f"Image download failed: {img_request.status_code}"
              )

          image = base64.b64encode(
              img_request.content
          ).decode("utf-8")


          payload = {
              "model": "llava",
              "prompt": question,
              "images": [
                  image
              ],
              "stream": False
          }


          print("Asking AI...")

          response = requests.post(
              "http://localhost:11434/api/generate",
              json=payload,
              timeout=300
          )


          print("HTTP:", response.status_code)

          data = response.json()


          if "response" in data:
              print("\n===== AI ANSWER =====")
              print(data["response"])

          else:
              print("\n===== OLLAMA ERROR =====")
              print(json.dumps(data, indent=2))
              exit(1)

          PY
